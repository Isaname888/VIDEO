<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MUSIN ISA</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f0f1a;
    color: white;
    overflow-x: hidden;
  }

  /* ================= VIDEO BACKGROUND ================= */
  .bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    object-fit: cover;
    z-index: -2;
    filter: brightness(0.35) saturate(1.5);
  }

  /* затемнение поверх видео */
  .dark-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: -1;
  }

  /* ================= PRELOADER ================= */
  .preloader {
    position: fixed;
    inset: 0;
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
  }

  .spinner {
    width: 70px;
    height: 70px;
    border: 5px solid rgba(255,255,255,0.1);
    border-top: 5px solid #00f5ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    box-shadow: 0 0 20px #00f5ff;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .hide { display: none; }

  /* ================= HEADER ================= */
  header {
    text-align: center;
    padding: 90px 20px;

    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 1s ease forwards;
  }

  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  header h1 {
    font-size: 40px;
    text-shadow: 0 0 20px #00f5ff;
  }

  header p {
    color: #bbb;
  }

  /* ================= BUTTON ================= */
  .btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    cursor: pointer;

    background: linear-gradient(90deg, #00f5ff, #6c5ce7);
    color: white;
    font-size: 15px;

    transition: 0.3s ease;
    box-shadow: 0 0 15px #00f5ff;
  }

  .btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px #00f5ff;
  }

  /* ================= SECTION ================= */
  .section {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 70px;

    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.5s;
  }

  /* ================= CARD ================= */
  .card {
    width: 210px;
    padding: 25px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 14px;
    text-align: center;

    transition: 0.3s ease;
    box-shadow: 0 0 10px rgba(0,245,255,0.1);
  }

  .card:hover {
    transform: scale(1.06);
    box-shadow: 0 0 25px #00f5ff;
    border-color: #00f5ff;
  }

  /* ================= IMAGE ================= */
  .img-card {
    width: 280px;
    height: 180px;
    position: relative;
    overflow: hidden;
    border-radius: 14px;
    border: 1px solid rgba(0,245,255,0.3);
  }

  .img-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s ease;
  }

  .img-card:hover img {
    transform: scale(1.15);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    opacity: 0;
    transition: 0.4s ease;
  }

  .img-card:hover .overlay {
    opacity: 1;
  }

  .text {
    position: absolute;
    bottom: 15px;
    left: 15px;
    color: white;
    opacity: 0;
    text-shadow: 0 0 10px #00f5ff;
    transition: 0.4s ease;
  }

  .img-card:hover .text {
    opacity: 1;
  }

</style>
</head>

<body>

<!-- ================= VIDEO (если нет файла — просто не покажется) ================= -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="dark-overlay"></div>

<!-- ================= PRELOADER ================= -->
<div class="preloader" id="preloader">
  <div class="spinner"></div>
  <p style="margin-top:15px; color:#00f5ff;">Loading Neon World...</p>
</div>

<!-- ================= CONTENT ================= -->
<header>
  <h1>MUSIN ISA 🚀</h1>
  <p>Neon UI • Animations • Hover • Pro Design</p>
  <button class="btn">Get Started</button>
</header>

<div class="section">
  <div class="card">🔥 Анимации</div>
  <div class="card">💎 Дизайн</div>
  <div class="card">⚡ Hover</div>
</div>

<div class="section">
  <div class="img-card">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <div class="overlay"></div>
    <div class="text">Neon City</div>
  </div>
</div>

<script>
  window.onload = function () {
    setTimeout(() => {
      document.getElementById("preloader").classList.add("hide");
    }, 2500);
  };
</script>

</body>
</html>
